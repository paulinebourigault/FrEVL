version: '3.8'

services:
  # Main FrEVL API service
  frevl-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: frevl:latest
    container_name: frevl-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=frevl-base
      - DEVICE=cuda
      - PORT=8000
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017
      - ENABLE_CACHE=true
      - ENABLE_METRICS=true
      - MAX_BATCH_SIZE=32
      - BATCH_TIMEOUT_MS=50
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./cache:/app/cache
      - ./logs:/app/logs
    depends_on:
      - redis
      - mongodb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - frevl-network

  # Redis cache service
  redis:
    image: redis:7-alpine
    container_name: frevl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - frevl-network

  # MongoDB for logging and analytics
  mongodb:
    image: mongo:6
    container_name: frevl-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=frevl123
      - MONGO_INITDB_DATABASE=frevl
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - frevl-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: frevl-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - frevl-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: frevl-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - frevl-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: frevl-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frevl-api
    restart: unless-stopped
    networks:
      - frevl-network

  # Gradio demo service
  demo:
    build:
      context: .
      dockerfile: Dockerfile.demo
    image: frevl-demo:latest
    container_name: frevl-demo
    ports:
      - "7860:7860"
    environment:
      - MODEL_NAME=frevl-base
      - DEVICE=cuda
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./examples:/app/examples:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - frevl-network

# Networks
networks:
  frevl-network:
    driver: bridge

# Volumes for persistent data
volumes:
  redis-data:
  mongo-data:
  prometheus-data:
  grafana-data:
